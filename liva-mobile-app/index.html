<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>LIVA Remote Control</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-left">
                <div class="status-indicator disconnected" id="connectionStatus"></div>
                <h1>LIVA Hub</h1>
            </div>
            <button id="connectBtn" class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
            </button>
        </header>

        <!-- Main Content Area -->
        <main class="content">
            
            <!-- Terminal Tab -->
            <section id="tab-terminal" class="tab-content active">
                <div class="chat-container" id="chatContainer">
                    <div class="message system-msg">
                        <p>Welcome to LIVA Remote Control. Connect to your PC via LAN.</p>
                    </div>
                </div>
                
                <div class="input-area glass-panel">
                    <input type="text" id="cmdInput" placeholder="Enter command or message..." autocomplete="off">
                    <button id="sendBtn" class="primary-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </section>

            <!-- Explorer Tab -->
            <section id="tab-explorer" class="tab-content hidden">
                <div class="explorer-header glass-panel">
                    <button id="navUpBtn" class="icon-btn" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <div class="current-path" id="currentPath">/</div>
                </div>
                <div class="file-list" id="fileList">
                    <!-- Files injected by JS -->
                    <div class="empty-state">Connect to view files.</div>
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="tab-settings" class="tab-content hidden">
                <div class="settings-card glass-panel">
                    <h2>Connection Settings</h2>
                    <div class="form-group">
                        <label>PC IP Address</label>
                        <input type="text" id="ipInput" placeholder="e.g. 192.168.1.100">
                    </div>
                    <div class="form-group">
                        <label>Port</label>
                        <input type="number" id="portInput" value="8082">
                    </div>
                    <div class="form-group">
                        <label>Security Token (Optional)</label>
                        <input type="password" id="tokenInput" placeholder="Optional for dev mode">
                    </div>
                    <button id="saveSettingsBtn" class="primary-btn full-width">Save & Connect</button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass-nav">
            <button class="nav-item active" data-target="tab-terminal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                <span>Terminal</span>
            </button>
            <button class="nav-item" data-target="tab-explorer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <span>Explorer</span>
            </button>
            <button class="nav-item" data-target="tab-settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
