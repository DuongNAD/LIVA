syntax = "proto3";

package liva;

// =============================================================
// LIVA Inference Engine — gRPC Protocol Definition
// Replaces TCP/JSONL with binary Protobuf over HTTP/2
// =============================================================

service LivaInferenceService {
  // Server-Streaming RPC: Gateway sends one request, Engine streams tokens back
  rpc StreamChat (ChatCompletionRequest) returns (stream ChatCompletionChunk);
  
  // Unary RPC: Non-streaming completion (for short prompts)
  rpc Chat (ChatCompletionRequest) returns (ChatCompletionResponse);
  
  // Health check
  rpc HealthCheck (HealthRequest) returns (HealthResponse);

  // Embedding RPC: Generate L2-normalized embeddings via shared GPU context
  // Supports batch input (repeated string) for ConsolidationCron throughput
  rpc Embed (EmbeddingRequest) returns (EmbeddingResponse);

  // [v29] Hot-Swap RPC: Unload current model, load new model (sequential single-model on VRAM)
  // Used by ModelOrchestrator to swap Router↔Expert without restarting the engine process
  rpc SwapModel (SwapModelRequest) returns (SwapModelResponse);
}

// ==================
// Request Messages
// ==================

message ChatMessage {
  string role = 1;       // "system", "user", "assistant"
  string content = 2;
}

message ChatCompletionRequest {
  string model = 1;                      // "router" or "expert"
  repeated ChatMessage messages = 2;
  float temperature = 3;
  int32 max_tokens = 4;
  bool stream = 5;
  string request_id = 6;                 // For tracking/correlation
  
  // Optional parameters
  float top_p = 7;
  float frequency_penalty = 8;
  float presence_penalty = 9;
  repeated string stop = 10;
}

// ==================
// Response Messages
// ==================

message ChatCompletionResponse {
  string id = 1;
  string object = 2;                    // "chat.completion"
  string model = 3;
  repeated ChatCompletionChoice choices = 4;
  UsageStats usage = 5;
}

message ChatCompletionChoice {
  int32 index = 1;
  ChatMessage message = 2;
  string finish_reason = 3;             // "stop", "length", "tool_calls"
}

message UsageStats {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

// Streaming chunk (one per token)
message ChatCompletionChunk {
  string id = 1;
  string object = 2;                    // "chat.completion.chunk"  
  string model = 3;
  repeated ChunkChoice choices = 4;
}

message ChunkChoice {
  int32 index = 1;
  ChunkDelta delta = 2;
  string finish_reason = 3;            // null until done, then "stop"
}

message ChunkDelta {
  string role = 1;                     // Only set in first chunk
  string content = 2;                  // Token text
}

// ==================
// Health Check
// ==================

message HealthRequest {}

message HealthResponse {
  bool alive = 1;
  string model_name = 2;
  int64 uptime_seconds = 3;
  float vram_usage_mb = 4;
  int32 kv_cache_type = 5;             // 0=F16, 2=Q4_0, 8=Q8_0
}

// ==================
// Embedding
// ==================

message EmbeddingRequest {
  repeated string input = 1;           // Batch of texts to embed
  string model = 2;                    // Model identifier (informational)
}

message EmbeddingData {
  repeated float embedding = 1;        // L2-normalized vector
  int32 index = 2;                     // Position in batch
}

message EmbeddingResponse {
  repeated EmbeddingData data = 1;     // One entry per input text
  string model = 2;                    // Echo back model name
  int32 dimensions = 3;               // Vector dimensionality (e.g., 768)
}

// ==================
// Model Hot-Swap (v29)
// ==================

message SwapModelRequest {
  string model_path = 1;              // Absolute path to GGUF file
  int32 n_ctx = 2;                    // Context length (0 = use default 8192)
  int32 n_gpu_layers = 3;             // GPU layers (-1 = all)
}

message SwapModelResponse {
  bool success = 1;                   // Whether swap completed successfully
  string error_message = 2;           // Empty if success=true
  string loaded_model = 3;            // Basename of newly loaded model
  int64 swap_duration_ms = 4;         // Time taken for the full swap cycle
}
